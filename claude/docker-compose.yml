services:
  claude:
    build:
      context: .
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    image: d_claude
    environment:
      CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING: "1"
      COLORTERM: truecolor
      TZ: ${TZ:-Europe/Berlin}
      HOST_MCP_TOKEN: ${HOST_MCP_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOST_WORKDIR}:${CONTAINER_WORKDIR}
    working_dir: ${CONTAINER_WORKDIR}
    stdin_open: true
    tty: true
